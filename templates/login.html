{% extends "base.html" %}
{% block title %}로그인 - 혜경 전자책 스튜디오{% endblock %}
{% block content %}
<section class="login-shell">
  <form class="login-card" method="post">
    <h1>전자책 작업실 로그인</h1>
    <p>기존 YouTube Shorts 계정으로 로그인합니다.</p>
    {% if error %}<div class="message error">{{ error }}</div>{% endif %}
    <label>아이디</label>
    <input name="username" autocomplete="username" placeholder="khg334 또는 khg334@hanmail.net" required>
    <label>비밀번호</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <button class="primary" type="submit">로그인</button>
  </form>
</section>
{% endblock %}
